<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Illustration 3</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
canvas { width: 70vw; height: 39.8vw; max-height: 70vh; max-width: 123.11vh; border-radius: 24px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');
if (!gl) alert('WebGL not supported');

canvas.width = 1920;
canvas.height = 1080;

const vsrc = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const fsrc = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;

// Horizontal gradient: yellow → cyan → blue → dark → blue → cyan → yellow
vec3 bandGrad(float t) {
    vec3 yellow = vec3(0.988, 1.0, 0.478);
    vec3 cyan   = vec3(0.235, 0.918, 0.922);
    vec3 blue   = vec3(0.094, 0.361, 0.686);
    vec3 dark   = vec3(0.169, 0.282, 0.353);

    if (t < 0.25962) return mix(yellow, cyan, t / 0.25962);
    if (t < 0.38462) return mix(cyan, blue, (t - 0.25962) / (0.38462 - 0.25962));
    if (t < 0.49519) return mix(blue, dark, (t - 0.38462) / (0.49519 - 0.38462));
    if (t < 0.65385) return mix(dark, blue, (t - 0.49519) / (0.65385 - 0.49519));
    if (t < 0.8125)  return mix(blue, cyan, (t - 0.65385) / (0.8125 - 0.65385));
    return mix(cyan, yellow, clamp((t - 0.8125) / (1.0 - 0.8125), 0.0, 1.0));
}

// Row base width: pattern per 8 rows: 1101, 1517, 1923, 1923, 1923, 1923, 1517, 1101
float getBaseW(float fi) {
    float j = fi;
    if (fi >= 8.0) j = fi - 8.0;
    if (j < 0.5 || j > 6.5) return 1101.0;
    if (j < 1.5 || j > 5.5) return 1517.0;
    return 1923.0;
}

// Flipped: first 4 of each group of 8
float isFlipped(float fi) {
    float j = fi;
    if (fi >= 8.0) j = fi - 8.0;
    return (j < 3.5) ? 1.0 : 0.0;
}

// Mouse strength for row i (based on base center Y)
float getMouseI(float fi) {
    float baseCY = 67.5 * fi + 33.75;
    float dist = length((u_mouse - vec2(960.0, baseCY)) / u_res);
    float mt = 1.0 - smoothstep(0.0, 0.65, dist);
    return mt * mt * (3.0 - 2.0 * mt);
}

// Breathing for row i
float getBreath(float fi) {
    float phase = fi * 1.37 + fi * fi * 0.23;
    return sin(u_time * 0.31 + phase) * 0.14
         + sin(u_time * 0.53 + phase * 1.7 + 2.1) * 0.08
         + sin(u_time * 0.17 + phase * 2.3 + 0.8) * 0.05;
}

// Height scale for row i
float getHScale(float fi, float maxM) {
    float mi = getMouseI(fi);
    float breath = getBreath(fi);
    float squeeze = maxM * (1.0 - mi) * 0.45;
    return 1.0 + breath + mi * 0.9 - squeeze;
}

void main() {
    vec2 pos = gl_FragCoord.xy;
    pos.y = u_res.y - pos.y;

    vec3 bg = vec3(0.988, 1.0, 0.478);
    vec3 color = bg;

    // Pass 1: find max mouse strength
    float maxM = 0.0;
    for (int i = 0; i < 16; i++) {
        maxM = max(maxM, getMouseI(float(i)));
    }

    // Pass 2: compute total raw height for normalization
    float totalRaw = 0.0;
    for (int i = 0; i < 16; i++) {
        totalRaw += 67.5 * getHScale(float(i), maxM);
    }
    float norm = 1080.0 / totalRaw;

    // Pass 3: find which row this pixel is in and render
    float cumY = 0.0;
    bool found = false;
    for (int i = 0; i < 16; i++) {
        if (!found) {
            float fi = float(i);
            float sc = getHScale(fi, maxM);
            float h = 67.5 * sc * norm;

            if (pos.y < cumY + h) {
                found = true;

                // Width: breathing + mouse
                float mi = getMouseI(fi);
                float breath = getBreath(fi);
                float bw = getBaseW(fi);
                float wScale = 1.0 + breath * 0.5 + mi * 0.3;
                float w = bw * wScale;
                float rowLeft = (1920.0 - w) * 0.5;

                if (pos.x >= rowLeft && pos.x <= rowLeft + w) {
                    float t = (pos.x - rowLeft) / w;
                    if (isFlipped(fi) > 0.5) t = 1.0 - t;

                    // Mouse shifts gradient stops horizontally
                    float mouseNX = (u_mouse.x - rowLeft) / w; // mouse x normalized to row
                    float gradPush = mi * (mouseNX - t) * 0.35;
                    // Auto drift per row
                    float phase = fi * 1.37 + fi * fi * 0.23;
                    float autoDrift = sin(u_time * 0.25 + phase) * 0.06
                                    + sin(u_time * 0.4 + phase * 1.7) * 0.04;
                    t = clamp(t + gradPush + autoDrift, 0.0, 1.0);

                    color = bandGrad(t);
                }
            }
            cumY += h;
        }
    }

    gl_FragColor = vec4(color, 1.0);
}
`;

function createShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s));
        return null;
    }
    return s;
}

const vs = createShader(gl.VERTEX_SHADER, vsrc);
const fs = createShader(gl.FRAGMENT_SHADER, fsrc);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);

if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
}

gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');

gl.uniform2f(uRes, canvas.width, canvas.height);
gl.viewport(0, 0, canvas.width, canvas.height);

// Two-stage mouse smoothing
let mouseX = canvas.width * 0.5;
let mouseY = canvas.height * 0.5;
let midX = mouseX, midY = mouseY;
let targetX = mouseX, targetY = mouseY;
let mouseOnCanvas = false;

canvas.addEventListener('mousemove', (e) => {
    mouseOnCanvas = true;
    const rect = canvas.getBoundingClientRect();
    targetX = (e.clientX - rect.left) / rect.width * canvas.width;
    targetY = (e.clientY - rect.top) / rect.height * canvas.height;
});

canvas.addEventListener('mouseleave', () => {
    mouseOnCanvas = false;
});

function getWanderPos(t) {
    const cx = canvas.width * 0.5;
    const cy = canvas.height * 0.5;
    const rx = canvas.width * 0.4;
    const ry = canvas.height * 0.4;
    return {
        x: cx + Math.sin(t * 0.23) * rx * 0.6 + Math.sin(t * 0.41 + 1.3) * rx * 0.3,
        y: cy + Math.sin(t * 0.19 + 2.0) * ry * 0.6 + Math.cos(t * 0.37 + 0.7) * ry * 0.3
    };
}

function render(time) {
    const t = time * 0.001;

    if (!mouseOnCanvas) {
        const wander = getWanderPos(t);
        targetX = wander.x;
        targetY = wander.y;
    }

    midX += (targetX - midX) * 0.04;
    midY += (targetY - midY) * 0.04;
    mouseX += (midX - mouseX) * 0.035;
    mouseY += (midY - mouseY) * 0.035;

    gl.uniform1f(uTime, t);
    gl.uniform2f(uMouse, mouseX, mouseY);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
