<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#ccc;font:13px/1.4 -apple-system,system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#1a1a1a;border-bottom:1px solid #333;flex-shrink:0;flex-wrap:wrap}
.tabs{display:flex;gap:4px}
.tabs button{position:relative;width:120px;height:68px;border:2px solid #333;background:#222;color:#fff;border-radius:8px;cursor:pointer;font:inherit;font-size:12px;font-weight:500;transition:.15s;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;padding:6px;text-shadow:0 1px 4px rgba(0,0,0,.8),0 0 12px rgba(0,0,0,.6)}
.tabs button canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:6px;pointer-events:none}
.tabs button span{position:relative;z-index:1}
.tabs button:hover{border-color:#666}
.tabs button.active{border-color:#88f;box-shadow:0 0 0 1px #88f}
.preset-bar{display:flex;align-items:center;gap:6px;margin-left:auto}
.preset-bar select{background:#222;color:#ccc;border:1px solid #333;padding:4px 8px;border-radius:4px;font:inherit}
.preset-bar button, #exportBtn, #resetBtn{padding:5px 12px;border:1px solid #333;background:#222;color:#aaa;border-radius:4px;cursor:pointer;font:inherit;transition:.15s}
.preset-bar button:hover, #exportBtn:hover, #resetBtn:hover{background:#2a2a2a;color:#fff}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:260px;overflow-y:auto;padding:10px;border-right:1px solid #333;flex-shrink:0;background:#1a1a1a}
.section{margin-bottom:12px}
.section h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#666;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #282828}
.ctrl{margin-bottom:8px}
.ctrl label{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;font-size:12px}
.ctrl label span.val{color:#888;font-size:11px;font-variant-numeric:tabular-nums}
.ctrl input[type=range]{width:100%;accent-color:#558}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.color-row input[type=color]{width:32px;height:24px;border:1px solid #333;border-radius:4px;padding:0;cursor:pointer;background:none}
.color-row span{font-size:12px}
#preview{flex:1;display:flex;justify-content:center;align-items:center;background:#000;overflow:hidden;position:relative}
canvas{border-radius:16px;max-width:90%;max-height:90%}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;justify-content:center;align-items:center}
#modal.show{display:flex}
#modal .inner{background:#1a1a1a;border:1px solid #333;border-radius:12px;width:min(90vw,800px);max-height:85vh;display:flex;flex-direction:column}
#modal .bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #333}
#modal .bar h2{font-size:14px;color:#ddd;font-weight:500}
#modal pre{flex:1;overflow:auto;padding:14px;margin:0;font:12px/1.5 'SF Mono',Menlo,monospace;color:#bbb;white-space:pre;tab-size:4}
#modal .bar button{padding:5px 12px;border:1px solid #333;background:#222;color:#aaa;border-radius:4px;cursor:pointer;font:inherit}
#modal .bar button:hover{background:#335;color:#fff}
</style>
</head>
<body>
<header>
  <div class="tabs" id="tabs"></div>
  <div class="preset-bar">
    <select id="presetSel"><option value="">Default</option></select>
    <button id="saveBtn">Save</button>
    <button id="delBtn">Delete</button>
    <button id="resetBtn">Reset</button>
    <button id="exportBtn">Export</button>
  </div>
</header>
<div id="main">
  <aside id="sidebar"></aside>
  <div id="preview"><canvas id="c"></canvas></div>
</div>
<div id="modal"><div class="inner"><div class="bar"><h2>Export Code</h2><div><button id="copyBtn">Copy</button> <button id="closeBtn">Close</button></div></div><pre id="codeOut"></pre></div></div>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');
canvas.width = 1920; canvas.height = 1080;

const VSRC = `attribute vec2 a_pos;\nvoid main(){gl_Position=vec4(a_pos,0.,1.);}`;

const UNIFORM_HEADER = `precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;
uniform vec3 u_c0,u_c1,u_c2,u_c3,u_c4;
uniform vec3 u_bg;
uniform float u_breathSpd,u_breathAmp;
uniform float u_mExpand,u_mSqueeze,u_mFalloff;
uniform float u_gradShift;\n`;

const SHADERS = {};

SHADERS.gradient1 = UNIFORM_HEADER + `
float sdfBox(vec2 p,vec2 b,float rTL,float rTR,float rBL,float rBR){
    p.y=-p.y;vec4 r=vec4(rTR,rBR,rTL,rBL);
    r.xy=(p.x>0.)?r.xy:r.zw;r.x=(p.y>0.)?r.x:r.y;
    vec2 q=abs(p)-b+r.x;return min(max(q.x,q.y),0.)+length(max(q,0.))-r.x;}
vec3 pillGrad(float t){
    if(t<.26442)return mix(u_c0,u_c1,t/.26442);
    if(t<.50962)return mix(u_c1,u_c2,(t-.26442)/(.50962-.26442));
    if(t<.77885)return mix(u_c2,u_c3,(t-.50962)/(.77885-.50962));
    return mix(u_c3,u_c4,clamp((t-.77885)/(1.-.77885),0.,1.));}
vec3 archGrad(float t){
    if(t<.48558)return mix(u_c2,u_c1,t/.48558);
    return mix(u_c1,u_c0,clamp((t-.48558)/(1.-.48558),0.,1.));}
vec3 overlayGrad(float t){
    if(t<.26442)return mix(u_c0,u_c1,t/.26442);
    return mix(u_c1,u_c2,clamp((t-.26442)/(1.-.26442),0.,1.));}
vec3 animGrad(vec2 pos,vec2 origin,vec2 size,vec2 sc,int gt,float flip){
    float t=clamp((pos.y-origin.y)/size.y,0.,1.);
    float phase=sc.x*.003+sc.y*.004;
    float ss=sin(u_time*.3+phase)*u_gradShift+sin(u_time*.5+phase*1.7)*u_gradShift*.667;
    vec2 tm=u_mouse-sc;float md=length(tm)/length(u_res);
    float ms=1.-smoothstep(0.,u_mFalloff,md);
    float mdir=(u_mouse.y-pos.y)/size.y;
    float msh=ms*.35*mdir;
    t=clamp(t+ss+msh,0.,1.);
    vec3 col;
    if(gt==0)col=pillGrad(t);
    else if(gt==1)col=archGrad(flip>.5?1.-t:t);
    else col=overlayGrad(flip>.5?1.-t:t);
    float sd=length(pos-u_mouse);
    float spot=ms*(1.-smoothstep(0.,350.,sd));
    col=mix(col,u_c4,spot*u_mExpand);
    return col;}
void main(){
    vec2 pos=gl_FragCoord.xy;pos.y=u_res.y-pos.y;
    vec3 color=u_bg;
    for(int col=0;col<3;col++){
        float cx=float(col)*639.;
        {vec2 o=vec2(cx,363.);vec2 s=vec2(639.,365.);float r=182.5;vec2 c=o+s*.5;
         float d=sdfBox(pos-c,s*.5,r,r,r,r);float a=1.-smoothstep(-1.,1.,d);
         if(a>0.)color=mix(color,animGrad(pos,o,s,c,0,0.),a);}
        {vec2 o=vec2(cx,728.);vec2 s=vec2(639.,362.);vec2 c=o+s*.5;
         float d=sdfBox(pos-c,s*.5,180.,180.,0.,0.);float a=1.-smoothstep(-1.,1.,d);
         if(a>0.)color=mix(color,animGrad(pos,o,s,c,1,0.),a);}
        {vec2 o=vec2(cx,728.);vec2 s=vec2(365.,362.);float r=182.5;vec2 c=o+s*.5;
         float d=sdfBox(pos-c,s*.5,r,r,0.,0.);float a=1.-smoothstep(-1.,1.,d);
         if(a>0.)color=mix(color,animGrad(pos,o,s,c,2,0.),a);}
        {vec2 o=vec2(cx,1.);vec2 s=vec2(639.,362.);vec2 c=o+s*.5;
         float d=sdfBox(pos-c,s*.5,0.,0.,180.,180.);float a=1.-smoothstep(-1.,1.,d);
         if(a>0.)color=mix(color,animGrad(pos,o,s,c,1,1.),a);}
        {vec2 o=vec2(cx,1.);vec2 s=vec2(365.,362.);float r=182.5;vec2 c=o+s*.5;
         float d=sdfBox(pos-c,s*.5,0.,0.,r,r);float a=1.-smoothstep(-1.,1.,d);
         if(a>0.)color=mix(color,animGrad(pos,o,s,c,2,1.),a);}
    }
    gl_FragColor=vec4(color,1.);}`;

SHADERS.gradient2 = UNIFORM_HEADER + `
vec4 bandGrad(float t,float alt){
    vec4 c0=vec4(u_c0,0.),c1=vec4(u_c0,.5),c2=vec4(u_c1,1.),c3=vec4(u_c1,.827),c4=vec4(u_c0,.5),c5=vec4(u_c0,0.);
    float s2=mix(.36058,.30769,alt),s3=mix(.59615,.66346,alt);
    if(t<.14423)return mix(c0,c1,t/.14423);
    if(t<s2)return mix(c1,c2,(t-.14423)/(s2-.14423));
    if(t<s3)return mix(c2,c3,(t-s2)/(s3-s2));
    if(t<.81731)return mix(c3,c4,(t-s3)/(.81731-s3));
    return mix(c4,c5,clamp((t-.81731)/(1.-.81731),0.,1.));}
float mStr(float cx,float cy){
    float d=length((u_mouse-vec2(cx,cy))/u_res);
    float t=1.-smoothstep(0.,u_mFalloff,d);return t*t*(3.-2.*t);}
void main(){
    vec2 pos=gl_FragCoord.xy;pos.y=u_res.y-pos.y;vec3 color=u_bg;
    float bw0=469.,bw1=256.,bw2=470.,bw3=256.,bw4=469.;
    float bh0=359.,bh1=758.,bh2=1080.,bh3=758.,bh4=359.;
    float by0=363.,by1=176.,by2=5.,by3=176.,by4=388.;
    float ph0=0.,ph1=1.2,ph2=4.8,ph3=3.6,ph4=2.4;
    float bcx0=234.5,bcx1=597.,bcx2=960.,bcx3=1323.,bcx4=1685.5;
    float bcy0=542.5,bcy1=555.,bcy2=545.,bcy3=555.,bcy4=567.5;
    float m0=mStr(bcx0,bcy0),m1=mStr(bcx1,bcy1),m2=mStr(bcx2,bcy2),m3=mStr(bcx3,bcy3),m4=mStr(bcx4,bcy4);
    float b0=(sin(u_time*.31*u_breathSpd)*.14+sin(u_time*.53*u_breathSpd+2.1)*.08+sin(u_time*.17*u_breathSpd+.8)*.05)*u_breathAmp;
    float b1=(sin(u_time*.37*u_breathSpd+1.)*.14+sin(u_time*.61*u_breathSpd+4.3)*.08+sin(u_time*.19*u_breathSpd+3.1)*.05)*u_breathAmp;
    float b2=(sin(u_time*.29*u_breathSpd+2.5)*.14+sin(u_time*.47*u_breathSpd+.7)*.08+sin(u_time*.22*u_breathSpd+5.4)*.05)*u_breathAmp;
    float b3=(sin(u_time*.41*u_breathSpd+3.8)*.14+sin(u_time*.59*u_breathSpd+2.9)*.08+sin(u_time*.14*u_breathSpd+1.6)*.05)*u_breathAmp;
    float b4=(sin(u_time*.34*u_breathSpd+5.2)*.14+sin(u_time*.51*u_breathSpd+1.4)*.08+sin(u_time*.21*u_breathSpd+4.)*.05)*u_breathAmp;
    float maxM=max(max(max(m0,m1),max(m2,m3)),m4);
    float xs0=1.+b0+m0*u_mExpand-maxM*(1.-m0)*u_mSqueeze;
    float xs1=1.+b1+m1*u_mExpand-maxM*(1.-m1)*u_mSqueeze;
    float xs2=1.+b2+m2*u_mExpand-maxM*(1.-m2)*u_mSqueeze;
    float xs3=1.+b3+m3*u_mExpand-maxM*(1.-m3)*u_mSqueeze;
    float xs4=1.+b4+m4*u_mExpand-maxM*(1.-m4)*u_mSqueeze;
    float tw=bw0*xs0+bw1*xs1+bw2*xs2+bw3*xs3+bw4*xs4;float nm=1920./tw;
    float w0=bw0*xs0*nm,w1=bw1*xs1*nm,w2=bw2*xs2*nm,w3=bw3*xs3*nm,w4=bw4*xs4*nm;
    float x1=w0,x2=w0+w1,x3=w0+w1+w2,x4=w0+w1+w2+w3;
    float cX=0.,cW=0.,cBH=0.,cBY=0.,cPh=0.,cFl=0.,cAl=0.,cM=0.;
    if(pos.x<x1){cX=0.;cW=w0;cBH=bh0;cBY=by0;cPh=ph0;cFl=0.;cAl=0.;cM=m0;}
    else if(pos.x<x2){cX=x1;cW=w1;cBH=bh1;cBY=by1;cPh=ph1;cFl=0.;cAl=0.;cM=m1;}
    else if(pos.x<x3){cX=x2;cW=w2;cBH=bh2;cBY=by2;cPh=ph2;cFl=0.;cAl=1.;cM=m2;}
    else if(pos.x<x4){cX=x3;cW=w3;cBH=bh3;cBY=by3;cPh=ph3;cFl=1.;cAl=0.;cM=m3;}
    else{cX=x4;cW=w4;cBH=bh4;cBY=by4;cPh=ph4;cFl=1.;cAl=0.;cM=m4;}
    float yS=1.+(sin(u_time*.26*u_breathSpd+cPh*2.3)*.15+sin(u_time*.43*u_breathSpd+cPh*.9+1.7)*.09+sin(u_time*.15*u_breathSpd+cPh*3.1+4.2)*.06)*u_breathAmp+cM*.4;
    float sH=cBH*yS,cCY=cBY+cBH*.5,sY=cCY-sH*.5;
    float uy=(pos.y-sY)/sH;
    if(uy>=0.&&uy<=1.){float t=uy;if(cFl>.5)t=1.-t;
        vec4 g=bandGrad(t,cAl);color=g.rgb*g.a+color*(1.-g.a);}
    gl_FragColor=vec4(color,1.);}`;

SHADERS.gradient3 = UNIFORM_HEADER + `
vec3 bandGrad(float t){
    if(t<.25962)return mix(u_c0,u_c1,t/.25962);
    if(t<.38462)return mix(u_c1,u_c2,(t-.25962)/(.38462-.25962));
    if(t<.49519)return mix(u_c2,u_c3,(t-.38462)/(.49519-.38462));
    if(t<.65385)return mix(u_c3,u_c2,(t-.49519)/(.65385-.49519));
    if(t<.8125)return mix(u_c2,u_c1,(t-.65385)/(.8125-.65385));
    return mix(u_c1,u_c0,clamp((t-.8125)/(1.-.8125),0.,1.));}
float getBaseW(float fi){float j=fi;if(fi>=8.)j=fi-8.;
    if(j<.5||j>6.5)return 1101.;if(j<1.5||j>5.5)return 1517.;return 1923.;}
float isFlipped(float fi){float j=fi;if(fi>=8.)j=fi-8.;return(j<3.5)?1.:0.;}
float getMouseI(float fi){float bCY=67.5*fi+33.75;
    float d=length((u_mouse-vec2(960.,bCY))/u_res);
    float mt=1.-smoothstep(0.,u_mFalloff,d);return mt*mt*(3.-2.*mt);}
float getBreath(float fi){float ph=fi*1.37+fi*fi*.23;
    return(sin(u_time*.31*u_breathSpd+ph)*.14+sin(u_time*.53*u_breathSpd+ph*1.7+2.1)*.08+sin(u_time*.17*u_breathSpd+ph*2.3+.8)*.05)*u_breathAmp;}
float getHS(float fi,float mx){float mi=getMouseI(fi);float br=getBreath(fi);
    return 1.+br+mi*u_mExpand-mx*(1.-mi)*u_mSqueeze;}
void main(){
    vec2 pos=gl_FragCoord.xy;pos.y=u_res.y-pos.y;vec3 color=u_bg;
    float maxM=0.;for(int i=0;i<16;i++)maxM=max(maxM,getMouseI(float(i)));
    float tR=0.;for(int i=0;i<16;i++)tR+=67.5*getHS(float(i),maxM);
    float nm=1080./tR;float cumY=0.;bool found=false;
    for(int i=0;i<16;i++){if(!found){float fi=float(i);float sc=getHS(fi,maxM);float h=67.5*sc*nm;
        if(pos.y<cumY+h){found=true;float mi=getMouseI(fi);float br=getBreath(fi);
            float bw=getBaseW(fi);float wS=1.+br*.5+mi*.3;float w=bw*wS;float rL=(1920.-w)*.5;
            if(pos.x>=rL&&pos.x<=rL+w){float t=(pos.x-rL)/w;if(isFlipped(fi)>.5)t=1.-t;
                float mNX=(u_mouse.x-rL)/w;float gP=mi*(mNX-t)*.35;
                float ph=fi*1.37+fi*fi*.23;
                float aD=(sin(u_time*.25*u_breathSpd+ph)*.06+sin(u_time*.4*u_breathSpd+ph*1.7)*.04)*u_gradShift;
                t=clamp(t+gP+aD,0.,1.);color=bandGrad(t);}}
        cumY+=h;}}
    gl_FragColor=vec4(color,1.);}`;

SHADERS.gradient4 = UNIFORM_HEADER + `
float getBaseW(float fi){float o=fi-floor(fi/3.)*3.;
    if(o>.5&&o<1.5)return 42.;return 43.;}
float getBaseCX(float fi){float g=floor(fi/3.);float o=fi-g*3.;float b=g*128.;
    if(o<.5)return b+21.5;if(o<1.5)return b+64.;return b+106.5;}
float getType(float fi){return fi-floor(fi/3.)*3.;}
vec3 colGrad(float t,float ty){
    float s1,s2,s3;
    if(ty<.5){s1=.48077;s2=.67788;s3=1.;}
    else if(ty<1.5){s1=.27885;s2=.5625;s3=.87981;}
    else{s1=.18269;s2=.45673;s3=.87981;}
    if(t<s1)return mix(u_c0,u_c1,t/s1);
    if(t<s2)return mix(u_c1,u_c2,(t-s1)/(s2-s1));
    if(t<s3)return mix(u_c2,u_c3,(t-s2)/(s3-s2));
    return u_c3;}
float getMouseI(float fi){float cx=getBaseCX(fi);
    float d=length((u_mouse-vec2(cx,540.))/u_res);
    float mt=1.-smoothstep(0.,u_mFalloff,d);return mt*mt*(3.-2.*mt);}
float getBreath(float fi){float ph=fi*1.37+fi*fi*.23;
    return(sin(u_time*.31*u_breathSpd+ph)*.14+sin(u_time*.53*u_breathSpd+ph*1.7+2.1)*.08+sin(u_time*.17*u_breathSpd+ph*2.3+.8)*.05)*u_breathAmp;}
float getHBreath(float fi){float ph=fi*.91+fi*fi*.17;
    return(sin(u_time*.26*u_breathSpd+ph)*.15+sin(u_time*.43*u_breathSpd+ph*.9+1.7)*.09+sin(u_time*.15*u_breathSpd+ph*3.1+4.2)*.06)*u_breathAmp;}
float getWS(float fi,float mx){float mi=getMouseI(fi);float br=getBreath(fi);
    return 1.+br+mi*u_mExpand-mx*(1.-mi)*u_mSqueeze;}
void main(){
    vec2 pos=gl_FragCoord.xy;pos.y=u_res.y-pos.y;vec3 color=u_bg;
    float maxM=0.;for(int i=0;i<45;i++)maxM=max(maxM,getMouseI(float(i)));
    float tR=0.;for(int i=0;i<45;i++)tR+=getBaseW(float(i))*getWS(float(i),maxM);
    float nm=1920./tR;float cumX=0.;bool found=false;
    for(int i=0;i<45;i++){if(!found){float fi=float(i);float sc=getWS(fi,maxM);float w=getBaseW(fi)*sc*nm;
        if(pos.x<cumX+w){found=true;float mi=getMouseI(fi);
            float t=pos.y/u_res.y;float hB=getHBreath(fi);
            float mNY=u_mouse.y/u_res.y;float yStr=1.+hB+mi*.4;
            t=t/max(yStr,.4);
            float ph=fi*1.37+fi*fi*.23;
            float aD=(sin(u_time*.25*u_breathSpd+ph)*.06+sin(u_time*.4*u_breathSpd+ph*1.7)*.04)*u_gradShift;
            float mD=(mNY-t)*mi*.35;t=clamp(t+aD+mD,0.,1.);
            color=colGrad(t,getType(fi));}
        cumX+=w;}}
    gl_FragColor=vec4(color,1.);}`;

// === Type Definitions ===
const TYPES = {
    gradient1: {
        name: 'Blue Shapes',
        shader: SHADERS.gradient1,
        sections: [
            { name: 'Colors', params: [
                { key:'bg', label:'Background', type:'color', default:'#0e82cd', uniform:'u_bg' },
                { key:'c0', label:'Pink', type:'color', default:'#eedbed', uniform:'u_c0' },
                { key:'c1', label:'Light Blue', type:'color', default:'#0faae3', uniform:'u_c1' },
                { key:'c2', label:'Dark Blue', type:'color', default:'#0e73c5', uniform:'u_c2' },
                { key:'c3', label:'Med Blue', type:'color', default:'#0e9edd', uniform:'u_c3' },
                { key:'c4', label:'Lavender', type:'color', default:'#e2d9f1', uniform:'u_c4' },
            ]},
            { name: 'Animation', params: [
                { key:'gradShift', label:'Stop Shift', type:'range', min:0, max:0.5, step:0.01, default:0.15, uniform:'u_gradShift' },
            ]},
            { name: 'Mouse', params: [
                { key:'mExpand', label:'Spot Brightness', type:'range', min:0, max:1, step:0.01, default:0.35, uniform:'u_mExpand' },
                { key:'mFalloff', label:'Falloff', type:'range', min:0.1, max:1.5, step:0.01, default:0.5, uniform:'u_mFalloff' },
                { key:'smooth1', label:'Smoothing 1', type:'range', min:0.005, max:0.2, step:0.005, default:0.1 },
                { key:'smooth2', label:'Smoothing 2', type:'range', min:0.005, max:0.2, step:0.005, default:0.08 },
            ]},
            { name: 'Wander', params: [
                { key:'wanderSpd', label:'Speed', type:'range', min:0.1, max:3, step:0.1, default:1 },
                { key:'wanderRad', label:'Radius', type:'range', min:0.1, max:2, step:0.1, default:1 },
            ]},
        ]
    },
    gradient2: {
        name: 'Pink Bands',
        shader: SHADERS.gradient2,
        sections: [
            { name: 'Colors', params: [

        sections: [

                { key:'c0', label:'Yellow', type:'color', default:'#fcff7a', uniform:'u_c0' },
                { key:'c1', label:'Cyan', type:'color', default:'#3ceaeb', uniform:'u_c1' },
                { key:'c2', label:'Blue', type:'color', default:'#185cb0', uniform:'u_c2' },
                { key:'c3', label:'Dark', type:'color', default:'#2b485a', uniform:'u_c3' },
            ]},
            { name: 'Animation', params: [

        sections: [
            { name: 'Colors', params: [
                { key:'bg', label:'Background', type:'color', default:'#ffffff', uniform:'u_bg' },
                { key:'c0', label:'Red', type:'color', default:'#f92821', uniform:'u_c0' },
                { key:'c1', label:'Orange', type:'color', default:'#fc7021', uniform:'u_c1' },
                { key:'c2', label:'Yellow', type:'color', default:'#f8d636', uniform:'u_c2' },
                { key:'c3', label:'White', type:'color', default:'#ffffff', uniform:'u_c3' },
            ]},
            { name: 'Animation', params: [
                { key:'breathSpd', label:'Breath Speed', type:'range', min:0.1, max:3, step:0.1, default:1, uniform:'u_breathSpd' },
                { key:'breathAmp', label:'Breath Amplitude', type:'range', min:0, max:3, step:0.1, default:1, uniform:'u_breathAmp' },

                { key:'mSqueeze', label:'Squeeze', type:'range', min:0, max:1, step:0.05, default:0.45, uniform:'u_mSqueeze' },
                { key:'mFalloff', label:'Falloff', type:'range', min:0.1, max:1.5, step:0.01, default:0.65, uniform:'u_mFalloff' },

                { key:'smooth2', label:'Smoothing 2', type:'range', min:0.005, max:0.2, step:0.005, default:0.035 },
            ]},
            { name: 'Wander', params: [
                { key:'wanderSpd', label:'Speed', type:'range', min:0.1, max:3, step:0.1, default:1 },

};

// === State ===
let currentType = 'gradient1';
let params = {};
let program = null;
let uLocs = {};
let mouseX = 960, mouseY = 540, midX = 960, midY = 540, targetX = 960, targetY = 540;
let mouseOnCanvas = false;

// === Helpers ===
function hexToRGB(hex) {
    return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
}
function rgbToHex(r,g,b) {
    return '#'+[r,g,b].map(v=>Math.round(v*255).toString(16).padStart(2,'0')).join('');
}
function getDefaults(type) {
    const p = {};
    for (const s of TYPES[type].sections) for (const d of s.params) p[d.key] = d.default;
    return p;
}
function allParams(type) {
    const list = [];
    for (const s of TYPES[type].sections) for (const d of s.params) list.push(d);
    return list;
}

// === WebGL ===
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function compileShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); return null; }
    return s;
}

function buildProgram(fsrc) {
    if (program) gl.deleteProgram(program);
    const vs = compileShader(gl.VERTEX_SHADER, VSRC);
    const fs = compileShader(gl.FRAGMENT_SHADER, fsrc);
    const p = gl.createProgram();
    gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
    gl.useProgram(p);
    const aPos = gl.getAttribLocation(p, 'a_pos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
    program = p;
    // Cache uniform locations
    const names = ['u_res','u_time','u_mouse','u_c0','u_c1','u_c2','u_c3','u_c4','u_bg',
                   'u_breathSpd','u_breathAmp','u_mExpand','u_mSqueeze','u_mFalloff','u_gradShift'];
    uLocs = {};
    for (const n of names) uLocs[n] = gl.getUniformLocation(p, n);
    gl.uniform2f(uLocs.u_res, canvas.width, canvas.height);
    gl.viewport(0, 0, canvas.width, canvas.height);
}

function setUniforms() {
    for (const pd of allParams(currentType)) {
        if (!pd.uniform) continue;
        const loc = uLocs[pd.uniform];
        if (!loc) continue;
        if (pd.type === 'color') {
            const [r,g,b] = hexToRGB(params[pd.key]);
            gl.uniform3f(loc, r, g, b);
        } else {
            gl.uniform1f(loc, params[pd.key]);
        }
    }
}

// === UI ===
const THUMBNAILS = {
    gradient1: 'thumbnails/CleanShot 2026-03-08 at 21.25.08@2x.jpg',
    gradient2: 'thumbnails/CleanShot 2026-03-08 at 21.25.15@2x.jpg',
    gradient3: 'thumbnails/CleanShot 2026-03-08 at 21.25.22@2x.jpg',
    gradient4: 'thumbnails/CleanShot 2026-03-08 at 21.25.28@2x.jpg',
};

function buildTabs() {
    const el = document.getElementById('tabs');
    el.innerHTML = '';
    for (const [k, v] of Object.entries(TYPES)) {
        const btn = document.createElement('button');
        btn.className = k === currentType ? 'active' : '';
        btn.onclick = () => switchType(k);
        const img = document.createElement('img');
        img.src = THUMBNAILS[k];
        img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border-radius:6px;pointer-events:none;object-fit:cover';
        btn.appendChild(img);
        const label = document.createElement('span');
        label.textContent = v.name;
        btn.appendChild(label);
        el.appendChild(btn);
    }
}

function buildSidebar() {
    const el = document.getElementById('sidebar');
    el.innerHTML = '';
    const def = TYPES[currentType];
    for (const section of def.sections) {
        const sec = document.createElement('div');
        sec.className = 'section';
        sec.innerHTML = `<h3>${section.name}</h3>`;
        for (const p of section.params) {
            if (p.type === 'color') {
                const row = document.createElement('div');
                row.className = 'color-row';
                row.innerHTML = `<input type="color" id="p_${p.key}" value="${params[p.key]}"><span>${p.label}</span>`;
                row.querySelector('input').addEventListener('input', e => {
                    params[p.key] = e.target.value;
                    setUniforms();
                });
                sec.appendChild(row);
            } else {
                const ctrl = document.createElement('div');
                ctrl.className = 'ctrl';
                ctrl.innerHTML = `<label>${p.label}<span class="val" id="v_${p.key}">${params[p.key]}</span></label>
                    <input type="range" id="p_${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${params[p.key]}">`;
                ctrl.querySelector('input').addEventListener('input', e => {
                    params[p.key] = parseFloat(e.target.value);
                    document.getElementById('v_'+p.key).textContent = params[p.key];
                    setUniforms();
                });
                sec.appendChild(ctrl);
            }
        }
        el.appendChild(sec);
    }
}

function switchType(type) {
    currentType = type;
    // Check for active preset or use defaults
    const sel = document.getElementById('presetSel');
    params = getDefaults(type);
    buildProgram(TYPES[type].shader);
    setUniforms();
    buildTabs();
    buildSidebar();
    loadPresetList();
    sel.value = '';
    // Reset mouse
    mouseX = midX = targetX = 960;
    mouseY = midY = targetY = 540;
}

// === Presets ===
function getStoredPresets() {
    try { return JSON.parse(localStorage.getItem('gradientStudioPresets') || '{}'); }
    catch { return {}; }
}
function storePresets(data) {
    localStorage.setItem('gradientStudioPresets', JSON.stringify(data));
}
function loadPresetList() {
    const sel = document.getElementById('presetSel');
    sel.innerHTML = '<option value="">Default</option>';
    const stored = getStoredPresets();
    const list = stored[currentType] || [];
    for (let i = 0; i < list.length; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = list[i].name;
        sel.appendChild(opt);
    }
}
document.getElementById('saveBtn').onclick = () => {
    const name = prompt('Preset name:');
    if (!name) return;
    const stored = getStoredPresets();
    if (!stored[currentType]) stored[currentType] = [];
    stored[currentType].push({ name, params: { ...params } });
    storePresets(stored);
    loadPresetList();
    document.getElementById('presetSel').value = stored[currentType].length - 1;
};
document.getElementById('delBtn').onclick = () => {
    const sel = document.getElementById('presetSel');
    if (sel.value === '') return;
    const stored = getStoredPresets();
    stored[currentType].splice(parseInt(sel.value), 1);
    storePresets(stored);
    loadPresetList();
    sel.value = '';
};
document.getElementById('presetSel').onchange = function() {
    if (this.value === '') {
        params = getDefaults(currentType);
    } else {
        const stored = getStoredPresets();
        params = { ...stored[currentType][parseInt(this.value)].params };
    }
    setUniforms();
    buildSidebar();
};
document.getElementById('resetBtn').onclick = () => {
    params = getDefaults(currentType);
    setUniforms();
    buildSidebar();
    document.getElementById('presetSel').value = '';
};

// === Export ===
document.getElementById('exportBtn').onclick = () => {
    const code = generateExport();
    document.getElementById('codeOut').textContent = code;
    document.getElementById('modal').classList.add('show');
};
document.getElementById('copyBtn').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('codeOut').textContent);
    document.getElementById('copyBtn').textContent = 'Copied!';
    setTimeout(() => document.getElementById('copyBtn').textContent = 'Copy', 1500);
};
document.getElementById('closeBtn').onclick = () => {
    document.getElementById('modal').classList.remove('show');
};

function generateExport() {
    const t = TYPES[currentType];
    const shader = t.shader;
    // Build uniform init lines
    let uInit = '';
    for (const pd of allParams(currentType)) {
        if (!pd.uniform) continue;
        if (pd.type === 'color') {
            const [r,g,b] = hexToRGB(params[pd.key]);
            uInit += `    gl.uniform3f(gl.getUniformLocation(prog,'${pd.uniform}'),${r.toFixed(4)},${g.toFixed(4)},${b.toFixed(4)});\n`;
        } else {
            uInit += `    gl.uniform1f(gl.getUniformLocation(prog,'${pd.uniform}'),${params[pd.key]});\n`;
        }
    }
    const s1 = params.smooth1 || 0.04;
    const s2 = params.smooth2 || 0.035;
    const ws = params.wanderSpd || 1;
    const wr = params.wanderRad || 1;

    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${t.name}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
canvas{width:70vw;height:39.8vw;max-height:70vh;max-width:123.11vh;border-radius:24px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const gl=canvas.getContext('webgl');
if(!gl)alert('WebGL not supported');
canvas.width=1920;canvas.height=1080;

const vsrc=\`attribute vec2 a_pos;
void main(){gl_Position=vec4(a_pos,0.,1.);}\`;

const fsrc=\`${shader}\`;

function cs(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}return s;}
const vs=cs(gl.VERTEX_SHADER,vsrc),fs=cs(gl.FRAGMENT_SHADER,fsrc);
const prog=gl.createProgram();gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(aPos);gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
gl.uniform2f(gl.getUniformLocation(prog,'u_res'),1920,1080);
gl.viewport(0,0,1920,1080);

    // Gradient parameters
${uInit}
const uTime=gl.getUniformLocation(prog,'u_time');
const uMouse=gl.getUniformLocation(prog,'u_mouse');

let mouseX=960,mouseY=540,midX=960,midY=540,targetX=960,targetY=540,mouseOn=false;
canvas.addEventListener('mousemove',e=>{mouseOn=true;const r=canvas.getBoundingClientRect();
    targetX=(e.clientX-r.left)/r.width*1920;targetY=(e.clientY-r.top)/r.height*1080;});
canvas.addEventListener('mouseleave',()=>{mouseOn=false;});

function wander(t){const cx=960,cy=540,rx=768*${wr},ry=432*${wr};
    return{x:cx+Math.sin(t*.23*${ws})*rx*.6+Math.sin(t*.41*${ws}+1.3)*rx*.3,
           y:cy+Math.sin(t*.19*${ws}+2)*ry*.6+Math.cos(t*.37*${ws}+.7)*ry*.3};}

function render(time){const t=time*.001;
    if(!mouseOn){const w=wander(t);targetX=w.x;targetY=w.y;}
    midX+=(targetX-midX)*${s1};midY+=(targetY-midY)*${s1};
    mouseX+=(midX-mouseX)*${s2};mouseY+=(midY-mouseY)*${s2};
    gl.uniform1f(uTime,t);gl.uniform2f(uMouse,mouseX,mouseY);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(render);}
requestAnimationFrame(render);
<\/script>
</body>
</html>`;
}

// === Mouse ===
canvas.addEventListener('mousemove', e => {
    mouseOnCanvas = true;
    const r = canvas.getBoundingClientRect();
    targetX = (e.clientX - r.left) / r.width * 1920;
    targetY = (e.clientY - r.top) / r.height * 1080;
});
canvas.addEventListener('mouseleave', () => { mouseOnCanvas = false; });

function getWanderPos(t) {
    const ws = params.wanderSpd || 1, wr = params.wanderRad || 1;
    const rx = 768 * wr, ry = 432 * wr;
    return {
        x: 960 + Math.sin(t * 0.23 * ws) * rx * 0.6 + Math.sin(t * 0.41 * ws + 1.3) * rx * 0.3,
        y: 540 + Math.sin(t * 0.19 * ws + 2.0) * ry * 0.6 + Math.cos(t * 0.37 * ws + 0.7) * ry * 0.3
    };
}

// === Render ===
function render(time) {
    const t = time * 0.001;
    if (!mouseOnCanvas) {
        const w = getWanderPos(t);
        targetX = w.x; targetY = w.y;
    }
    const s1 = params.smooth1 || 0.04;
    const s2 = params.smooth2 || 0.035;
    midX += (targetX - midX) * s1;
    midY += (targetY - midY) * s1;
    mouseX += (midX - mouseX) * s2;
    mouseY += (midY - mouseY) * s2;

    if (uLocs.u_time) gl.uniform1f(uLocs.u_time, t);
    if (uLocs.u_mouse) gl.uniform2f(uLocs.u_mouse, mouseX, mouseY);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
}

// === Init ===
switchType('gradient1');
requestAnimationFrame(render);
</script>
</body>
</html>
